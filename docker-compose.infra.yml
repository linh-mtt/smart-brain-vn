services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: smartmath-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartmath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartmath_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-smartmath}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - smartmath-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartmath} -d ${POSTGRES_DB:-smartmath}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # DragonflyDB (Redis-compatible cache)
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: smartmath-dragonfly
    command: >
      --port 6379
      --bind 0.0.0.0
      --maxmemory 2gb
      --cache_mode true
      --requirepass ${REDIS_PASSWORD:-smartmath_redis_dev}
      --snapshot_cron "*/30 * * * *"
      --dbfilename dump
      --dir /data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    ulimits:
      memlock: -1
    volumes:
      - dragonfly-data:/data
    networks:
      - smartmath-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-smartmath_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:
    driver: local
  dragonfly-data:
    driver: local

networks:
  smartmath-network:
    driver: bridge
